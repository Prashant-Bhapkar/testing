# ============================================================
#  AppEngg — Kubernetes Manifests
#  Fill every XXXXXXXX placeholder before applying.
#
#  Before deploying, create the K8s secret manually (once):
#    kubectl create secret generic appeng-secret \
#      --from-literal=OPENAI_API_KEY="..." \
#      --from-literal=MINIO_ACCESS_KEY="..." \
#      --from-literal=MINIO_SECRET_KEY="..." \
#      --from-literal=POSTGRES_USER="..." \
#      --from-literal=POSTGRES_PASSWORD="..." \
#      --from-literal=JWT_SECRET="$(openssl rand -hex 32)"
#
#  Apply:
#    kubectl apply -f deployment.yml
# ============================================================

# ── Backend Deployment ───────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: appeng-backend
  labels:
    k8s-app: appeng-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      k8s-app: appeng-backend
  template:
    metadata:
      labels:
        k8s-app: appeng-backend
    spec:
      imagePullSecrets:
        - name: XXXXXXXX          # your registry pull-secret name
      nodeSelector:
        "kubernetes.io/os": linux
      containers:
        - name: appeng-backend
          image: XXXXXXXX/appeng-backend:latest   # your registry/image:tag
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              protocol: TCP
          # Sensitive values pulled from K8s secret
          envFrom:
            - secretRef:
                name: appeng-secret
          # Non-sensitive config — fill these in
          env:
            - name: MINIO_ENDPOINT
              value: "XXXXXXXX"       # e.g. minio.example.com:9000
            - name: MINIO_BUCKET
              value: "XXXXXXXX"
            - name: MINIO_SECURE
              value: "true"           # false if http / self-signed
            - name: QDRANT_URL
              value: "XXXXXXXX"       # e.g. http://qdrant-service:6333
            - name: AI_BASE_URL
              value: "XXXXXXXX"       # e.g. http://ollama-service:11434
            - name: EMBEDDING_MODEL
              value: "XXXXXXXX"       # e.g. nomic-embed-text
            - name: CHAT_MODEL
              value: "XXXXXXXX"       # e.g. llama3
            - name: COLLECTION_NAME
              value: "documents"
            - name: POSTGRES_HOST
              value: "XXXXXXXX"       # e.g. postgres-service or external IP
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: "XXXXXXXX"       # e.g. dociq
            - name: JWT_EXPIRE_MINUTES
              value: "480"
            - name: ALLOWED_ORIGINS
              value: "https://XXXXXXXX"  # your app domain
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

---
# ── Backend Service ──────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: appeng-backend
  labels:
    k8s-app: appeng-backend
spec:
  type: ClusterIP
  selector:
    k8s-app: appeng-backend
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP

---
# ── Frontend Deployment ──────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: appeng-frontend
  labels:
    k8s-app: appeng-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      k8s-app: appeng-frontend
  template:
    metadata:
      labels:
        k8s-app: appeng-frontend
    spec:
      imagePullSecrets:
        - name: XXXXXXXX          # your registry pull-secret name
      nodeSelector:
        "kubernetes.io/os": linux
      containers:
        - name: appeng-frontend
          image: XXXXXXXX/appeng-frontend:latest  # your registry/image:tag
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

---
# ── Frontend Service ─────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: appeng-frontend
  labels:
    k8s-app: appeng-frontend
spec:
  type: ClusterIP
  selector:
    k8s-app: appeng-frontend
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP

---
# ── Ingress ──────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: appeng-ingress
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    # WebSocket support (for terminal feature)
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
spec:
  ingressClassName: nginx
  rules:
    - host: XXXXXXXX              # e.g. appeng.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: appeng-frontend
                port:
                  number: 80
  tls:
    - hosts:
        - XXXXXXXX                # same host as above
      secretName: XXXXXXXX        # TLS secret name (cert-manager or manual)
